name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd ~/bridge &&
            git pull origin main &&
            .venv/bin/pip install -q -r requirements.txt &&
            systemctl --user kill bridge 2>/dev/null || true &&
            systemctl --user restart bridge
          '

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
